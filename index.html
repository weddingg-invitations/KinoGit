<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/logo-icon/logo-icon.jpg">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/logo-icon/logo-icon.jpg">
    <link rel="mask-icon" type="image/png" sizes="16x16" href="./assets/logo-icon/logo-icon.jpg">
    <!-- helper -->
    <link rel="stylesheet" href="./css/helper/helper.css">
    <!-- fonts -->
    <link rel="stylesheet" href="./assets/fonts/TsukimiRounded/stylesheet.css">
    <!-- swiper -->
    <link rel="stylesheet" href="./css/swiper/swiper-bundle.min.css">
    <link rel="stylesheet" href="./css/swiper/swiperStyles.css">
    <!-- main -->
    <link rel="stylesheet" href="./pages/index/index.css">
    <title>KinoGit</title>
</head>

<body>
    <header>
        <!-- head swiper container-->
        <div class="head-top-cont">
            <a href="./index.html" class="logo">
                <h1>Kino<span>Git</span></h1>
            </a>

            <nav class="head-top-nav">
                <a href="javascript:void(0)" class="head-top-nav-items" id="top_movies">топ <span
                        id="FullYear">2010</span></a>
                <a href="javascript:void(0)" class="head-top-nav-items" id="action">Премьеры</a>
                <a href="javascript:void(0)" class="head-top-nav-items" id="animation">мультики</a>
                <a href="javascript:void(0)" class="head-top-nav-items" id="comedy">комедии</a>
                <a href="javascript:void(0)" class="head-top-nav-items" id="Family">Семейные</a>

                <div class="search" id="search">
                    <input class="search-inp" id="search_inp" type="text">
                    <span class="search-close" id="search-close"></span>
                    <img src="./assets/svg/search-icon.svg" class="search-btn" id="search_btn">
                </div>
            </nav>

            <div class="mob_open_close" id="mob_open_close">
                <img src="./assets/svg/burger-menu-right-svgrepo-com.svg" alt="">
            </div>
        </div>

        <div class="move_info_cont"></div>

        <div class="swiper-container head-swiper-container">
            <div class="swiper-wrapper head-swiper-wrapper" id="head-swiper-wrapper"></div>
            <!-- buttons -->
            <div class="swiper-button-prev-unique"></div>
            <div class="swiper-button-next-unique"></div>
            <!-- Add Pagination -->
            <div class="swiper-pagination head-swiper-pagination"></div>
            <!--swiper configs -->
            <script>
                function headSwiper() {

                    let bacground_poster_push = document.querySelector('header')
                    let move_info_cont = document.querySelector('.move_info_cont')

                    let move_info_cont_data_change = () => {

                        setTimeout(() => {

                            bacground_poster_push.style.backgroundImage = `url(${document.querySelector('.swiper-slide-active>.head_swiper_info>.head_swiper_info_imgSrc').textContent}`
                            // get 
                            let move_info_cont_original_title = document.querySelector('.swiper-slide-active>.head_swiper_info>.head_swiper_info_original_title').textContent
                            let move_info_cont_title = document.querySelector('.swiper-slide-active>.head_swiper_info>.head_swiper_info_title').textContent
                            let head_swiper_info_data = document.querySelector('.swiper-slide-active>.head_swiper_info>.head_swiper_info_data').textContent
                            let reyting = Math.round(Number(document.querySelector('.swiper-slide-active>.head_swiper_info>.head_swiper_info_reyting').textContent))
                            // set
                            function reytingStars() {
                                for (let i = 0; i < 10; i++) {
                                    let span = document.createElement('span')
                                    span.className = 'reyting_stars'
                                    document.getElementById('reyting_stars_cont').appendChild(span)

                                    if (i < Math.round(reyting)) {
                                        document.querySelectorAll('.reyting_stars')[i].style.cssText = 'background-color: yellow'
                                    }
                                }
                            }

                            move_info_cont.innerHTML = `<h2 class="move_info_cont_title">${move_info_cont_title}</h2>
                                <p class="move_info_cont_date">дата выхода - ${head_swiper_info_data.replace(/-/g, " / ")}</p>
                                <p class="move_info_cont_reyting">рейтинг TMDB - 
                                    <span class='reyting_stars_cont' id='reyting_stars_cont'></span>
                                </p>

                                <div class="move_info_cont_row">
                                    <div class="move_info_cont_play movie" move_data="${move_info_cont_title} ,${move_info_cont_original_title}, ${head_swiper_info_data.slice(0, 4)}">
                                        <img src="./assets/svg/icons-play.png" alt="play">смотреть
                                    </div>
                                </div>`

                            setTimeout((e) => {
                                document.querySelector('.move_info_cont_title').classList.add('move_info_cont_date_anim')
                                document.querySelector('.move_info_cont_date').classList.add('move_info_cont_date_anim')
                                document.querySelector('.move_info_cont_reyting').classList.add('move_info_cont_date_anim')
                                document.querySelector('.move_info_cont_row').classList.add('move_info_cont_date_anim')
                            }, 500);

                            reytingStars()
                            move_info_cont_play()
                        }, 400)
                    }

                    let swiper = new Swiper('.head-swiper-container', {
                        effect: 'coverflow',
                        speed: 500,
                        centeredSlides: true,
                        slidesPerView: 'auto',
                        loop: true,
                        coverflowEffect: {
                            depth: 40,
                            modifier: 5,
                            rotate: 0,
                            // scale:1.1,
                            slideShadows: true,
                            stretch: -10,
                        },
                        navigation: {
                            nextEl: '.swiper-button-next-unique',
                            prevEl: '.swiper-button-prev-unique',
                        },
                        pagination: {
                            el: '.swiper-pagination',
                            clickable: true,
                        },
                        autoplay: {
                            delay: 5000,
                        },
                        on: {
                            // -------- touch & move--------
                            sliderMove: function () {
                                move_info_cont_data_change()
                            },

                            // -------- if buttones activete run this || autoplay--------
                            slideChange: function () {
                                move_info_cont_data_change()
                            }
                        }
                    })
                    move_info_cont_data_change()
                }
            </script>
        </div>

    </header>

    <main id="main">
        <div class="main_films_categories_cont">
            <section class="main__section">
                <div class="main__section__films" id="main__section__films"></div>
            </section>

            <nav class="right-nav">
                <h3 class="categories-title">
                    <span class="text_1">категории</span>
                    <span class="text_2">выберите любимый жанры</span>
                </h3>
                <div class="categories" id="categories"></div>
            </nav>
        </div>
    </main>

    <footer>
        <div class="pagination">
            <div class="page-prev" id="prev">
                <img src="./assets/svg/next-svgrepo-com.svg" alt="prev btn">
            </div>

            <div class="current" id="current">
                <div class="total_pages" id="total_pages"></div>
            </div>

            <div class="page-next" id="next">
                <img src="./assets/svg/next-svgrepo-com.svg" alt="next btn">
            </div>
        </div>

        <div class="all-info">
            <a href="./index.html" class="logo">
                <h1>Kino<span>Git</span></h1>
            </a>
            <nav class="navigation">
                <a href="./pages/privacy-polic/privacy-polic.html">Правообладателям</a>
                <a href="./pages/app/app.html">Приложение</a>
                <a href="./pages/contact/contact.html">Контакты</a>
            </nav>
        </div>
    </footer>

    <script src="./js/swiper/swiper-bundle.min.js"></script>
    <script src="./js/searchAnim/searchAnim.js"></script>
    <script src="./js/mob_open_close/mob_open_close.js"></script>
    <script src="./pages/index/index.js"></script>

</body>

</html>
